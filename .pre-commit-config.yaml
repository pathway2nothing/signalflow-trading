# Pre-commit hooks for sf (signalflow-trading).
#
# Local install (once per clone):
#     uv pip install -e ".[dev]"
#     .venv/bin/pre-commit install
#
# Run on the full repo manually:
#     .venv/bin/pre-commit run --all-files
#
# By default pre-commit only passes *staged* files to hooks, so day-to-day
# commits only check what you changed. The ``--all-files`` run will surface
# pre-existing format / lint drift across the repo; that's expected.
#
# Mypy is scoped tight to ``src/signalflow/core/`` - that subtree is fully
# annotated and clean today; wider modules accumulate untyped helpers (numba
# fallbacks, pre-existing target/detector files) that would flood the hook.
# Expand the ``files:`` regex as more subtrees reach a clean baseline.
#
# ``--follow-imports=silent`` prevents mypy from chasing imports out of core/
# and reporting on the rest of the package.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        files: ^src/signalflow/core/
        args: [--follow-imports=silent]
        additional_dependencies:
          - loguru
          - numpy>=1.24
          - polars>=0.20
